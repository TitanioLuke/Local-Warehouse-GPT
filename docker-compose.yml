version: '3.8'

services:

  ollama:
    image: ollama/ollama:latest
    container_name: warehouse-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - warehouse-net
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse-gpt
    ports:
      - "8501:8501"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - chroma_data:/app/chroma_db
    networks:
      - warehouse-net
    restart: unless-stopped

networks:
  warehouse-net:
    driver: bridge

volumes:
  ollama_models:
  chroma_data:
